      // 浣跨敤 Blob URL 鎵撳紑鏂版爣绛鹃〉锛岄伩鍏嶉儴鍒嗘祻瑙堝櫒鍦?document.write 涓嬪嚭鐜扮┖鐧介〉銆?

    function hasFiniteValue(values) {
      if (!Array.isArray(values) || !values.length) return false;
      for (let i = 0; i < values.length; i += 1) {
        if (Number.isFinite(values[i])) return true;
      }
      return false;
    }

    function parseTimelineInstant(value) {
      const text = String(value || '').trim();
      if (!text) return NaN;
      const normalized = text.replace(/\//g, '-');
      let ts = Date.parse(normalized);
      if (Number.isFinite(ts)) return ts;
      ts = Date.parse(normalized.replace(' ', 'T'));
      return Number.isFinite(ts) ? ts : NaN;
    }

    function buildTimelineStepSeconds(timeline, valueCount) {
      const count = Math.max(0, Number(valueCount) || 0);
      if (count <= 1) return [];
      const labels = Array.isArray(timeline) ? timeline : [];
      const steps = new Array(count - 1).fill(1);
      let hasParsedStep = false;
      for (let i = 0; i < count - 1; i += 1) {
        const t0 = parseTimelineInstant(labels[i]);
        const t1 = parseTimelineInstant(labels[i + 1]);
        if (!Number.isFinite(t0) || !Number.isFinite(t1)) continue;
        const dtSeconds = (t1 - t0) / 1000;
        if (Number.isFinite(dtSeconds) && dtSeconds > 0) {
          steps[i] = dtSeconds;
          hasParsedStep = true;
        }
      }
      return hasParsedStep ? steps : new Array(count - 1).fill(1);
    }

    function integrateSeriesByTimeline(values, timeline) {
      const list = Array.isArray(values) ? values : [];
      if (list.length <= 1) return 0;
      const steps = buildTimelineStepSeconds(timeline, list.length);
      let total = 0;
      for (let i = 0; i < list.length - 1; i += 1) {
        const v0 = Number(list[i]);
        const v1 = Number(list[i + 1]);
        if (!Number.isFinite(v0) || !Number.isFinite(v1)) continue;
        const dt = Number(steps[i]);
        if (!Number.isFinite(dt) || dt <= 0) continue;
        total += ((v0 + v1) * 0.5) * dt;
      }
      return total;
    }

    function buildFlowVolumeCompareSpec(simValues, obsValues, timeline) {
      const simVolume = integrateSeriesByTimeline(simValues, timeline);
      const obsVolume = integrateSeriesByTimeline(obsValues, timeline);
      const hasSim = Math.abs(simVolume) > 1e-12;
      const hasObs = Math.abs(obsVolume) > 1e-12;
      const completionRatio = hasObs ? (simVolume / obsVolume) : null;
      return {
        simVolume: simVolume,
        obsVolume: obsVolume,
        completionRatio: Number.isFinite(completionRatio) ? completionRatio : null,
        hasCompareBars: hasSim || hasObs
      };
    }

    function classifyDirectEdgeType(edgeType) {
      const t = Number(edgeType);
      if (t === 1) return '上游来流(type=1)';
      if (t === 2) return '分水口(type=2)';
      if (t === 3) return '下游退水(type=3)';
      if (t === 6) return '渗漏损失(type=6)';
      if (t === 0 || t === 4) return '节制闸(type=' + t + ')';
      if (Number.isFinite(t)) return '未知(type=' + t + ')';
      return '未知';
    }

    function getCurrentChannelSegmentInfo() {
      const label = String(selectedChannelLabel || '').trim();
      if (!label) return null;

      const indirectRows = currentEdges.filter((edge) => {
        if (!edge) return false;
        if (String(edge.connectionType || '').trim() !== 'indirect') return false;
        return buildEdgeSegmentLabel(edge) === label;
      });
      if (!indirectRows.length) return null;

      const main = indirectRows[0];
      const source = String(main.source || '').trim();
      const target = String((isValidNodeName(main.target) ? main.target : main.end) || '').trim();
      const canal = String(main.canal || '').trim();

      const directRowsRaw = currentEdges.filter((edge) => {
        if (!edge) return false;
        if (String(edge.connectionType || '').trim() !== 'direct') return false;
        const s = String(edge.source || '').trim();
        const t = String(edge.target || '').trim();
        const e = String(edge.end || '').trim();
        const c = String(edge.canal || '').trim();
        const inSameSegmentBySE = source && target && s === source && (e === target || t === target);
        const inSameSegmentByEnd = target && e === target;
        const inSameCanal = canal && c && c === canal && s === source;
        return inSameSegmentBySE || inSameSegmentByEnd || inSameCanal;
      });

      const dedup = new Set();
      const directRows = [];
      directRowsRaw.forEach((edge) => {
        const k = [edge.id, edge.source, edge.target, edge.end, edge.edgeType].map((v) => String(v || '')).join('|');
        if (dedup.has(k)) return;
        dedup.add(k);
        directRows.push(edge);
      });

      return { label, source, target, canal, indirectRows, directRows };
    }

    function resetPendingPlotlyCharts() {
      pendingPlotlyCharts = [];
      plotlyChartSeq = 0;
    }

    function applyChartListFillMode(listEl, cardCount) {
      if (!listEl) return;
      const count = Number(cardCount) || 0;
      const shouldFill = count > 0 && count <= 3;
      if (!shouldFill) {
        listEl.classList.remove('fill-cards');
        listEl.style.gridTemplateRows = '';
        return;
      }
      listEl.classList.add('fill-cards');
      listEl.style.gridTemplateRows = 'repeat(' + count + ', minmax(0, 1fr))';
    }

    function buildChartCardHtml(title, values, subtitle, options) {
      const opts = options || {};
      const cardKey = toGateCardKey(opts.cardKey || subtitle || title);
      const cardKeyAttr = cardKey ? (' data-gate-key="' + escapeHtmlAttr(cardKey) + '"') : '';

      const showTimelineInfo = !!opts.showTimelineInfo;

      const obsFinite = obsValues.filter((value) => Number.isFinite(value));

      const minValue = finiteValues.length ? Math.min.apply(null, finiteValues) : null;
      const maxValue = finiteValues.length ? Math.max.apply(null, finiteValues) : null;

        (showTimelineInfo ? buildTimelineInfoHtml(opts.timeline) : ''),
        '<div id="' + chartId + '" class="detail-chart-plot"></div>',
        (!headerMeta ? '<div class="detail-chart-meta"><span>min=' + (minValue == null ? '-' : minValue.toFixed(3)) + (yUnit ? (' ' + yUnit) : '') + '</span><span>max=' + (maxValue == null ? '-' : maxValue.toFixed(3)) + (yUnit ? (' ' + yUnit) : '') + '</span></div>' : ''),
        (!headerMeta ? '<div class="detail-chart-meta"><span>点数=' + finiteValues.length + '</span><span>末值=' + (lastValue == null ? '-' : lastValue.toFixed(3)) + (yUnit ? (' ' + yUnit) : '') + '</span></div>' : ''),
        (!headerMeta && obsFinite.length ? '<div class="detail-chart-meta"><span>实测点数=' + obsFinite.length + '</span><span>实测末值=' + (obsLastValue == null ? '-' : obsLastValue.toFixed(3)) + (yUnit ? (' ' + yUnit) : '') + '</span></div>' : ''),
        '</div>'
      ].join('');

    function buildFlowBreakdownRows(items, kindLabel) {
      const list = Array.isArray(items) ? items : [];
      if (!list.length) return '<div class="flow-breakdown-empty">' + kindLabel + '：无</div>';

    function buildFlowBreakdownTableHtml(inflowItems, outflowItems) {
      return [
        '<details class="flow-breakdown">',
        '<summary>查看流量分解明细</summary>',
        '<div class="flow-breakdown-content">',
        buildFlowBreakdownRows(inflowItems, '入流'),

    function buildCombinedFlowSummaryCard(gateName, inflowValues, outflowValues, totalValues, timeline, inflowItems, outflowItems) {
      const inLast = getLastFiniteValue(inflowValues);
      const outLast = getLastFiniteValue(outflowValues);
      const totalLast = getLastFiniteValue(totalValues);

        { label: '入流', values: inflowValues, color: '#2563eb', dash: 'solid' },

        { label: '总计', values: totalValues, color: '#16a34a', dash: 'solid' }
      ], timeline, 'm^3/s');
      const headMeta = '入流末值=' + (inLast == null ? '-' : inLast.toFixed(3)) + ' | 出流末值=' + (outLast == null ? '-' : outLast.toFixed(3)) + ' | 总计末值=' + (totalLast == null ? '-' : totalLast.toFixed(3));
      return [

        '<div class="detail-chart-head"><p class="detail-chart-title">关联流量汇总/分解</p><span class="detail-chart-title-meta">' + headMeta + '</span></div>',
        '<div id="' + chartId + '" class="detail-chart-plot"></div>',
        buildFlowBreakdownTableHtml(inflowItems, outflowItems),

      ].join('');
    }

    function normalizeHeader(value) {
      return String(value || '').replace(/^\uFEFF/, '').replace(/\u00A0/g, ' ').trim();
    }

    function normalizeTimeKey(value) {
      const raw = normalizeHeader(value);
      if (!raw) return '';
      const text = raw.replace(/\//g, '-').replace('T', ' ').replace(/\s+/g, ' ').trim();
      const m = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2})(?::(\d{1,2}))?(?::(\d{1,2}))?)?$/);
      if (!m) return text;
      const yyyy = m[1];
      const mm = String(Number(m[2] || 1)).padStart(2, '0');
      const dd = String(Number(m[3] || 1)).padStart(2, '0');
      const hh = String(Number(m[4] || 0)).padStart(2, '0');
      const mi = String(Number(m[5] || 0)).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd + ' ' + hh + ':' + mi;
    }

    function canonicalName(value) {
      return normalizeHeader(value).replace(/[\s\t\r\n]/g, '');
    }

    function formatSegmentLabel(source, target, canal) {
      const s = String(source || '').trim();
      const t = String(target || '').trim();
      const c = String(canal || '').trim();
      const base = s && t ? (s + ' -> ' + t) : (s || t);
      return c ? (base + '（' + c + '）') : base;
    }

    function buildChannelLegendEntries(edges, colorSourceMap) {
      const colorMap = colorSourceMap instanceof Map ? colorSourceMap : new Map();
      const entries = [];
      const seen = new Set();
      (Array.isArray(edges) ? edges : []).forEach((edge) => {
        if (!edge || edge.connectionType !== 'indirect') return;
        const source = String(edge.source || '').trim();
        const target = String((isValidNodeName(edge.target) ? edge.target : edge.end) || '').trim();
        if (!source || !target) return;
        const label = formatSegmentLabel(source, target, edge.canal);
        if (!label || seen.has(label)) return;
        seen.add(label);
        entries.push({
          label,
          color: colorMap.get(label) || CHANNEL_PALETTE[entries.length % CHANNEL_PALETTE.length]
        });
      });

      if (entries.length) return entries;
      return Array.from(colorMap.entries()).map(([label, color]) => ({ label, color }));
    }

    function getObsSeriesForName(name) {
      const key = normalizeHeader(name);
      const keyCanon = canonicalName(key);
      if (keyCanon.indexOf('inflow') === 0 || keyCanon.indexOf('leakage') === 0 || keyCanon.indexOf('d') === 0) {
        return [];
      }
      const aligned = currentObsAlignedByFlow.get(key);
      if (aligned && aligned.length) return aligned;
      const direct = currentObsMap.byName.get(key);
      if (direct && direct.length) return direct;
      const canon = currentObsCanonical.get(keyCanon);
      if (canon && canon.length) return canon;
      return [];
    }

    function getFlowSeriesForName(name) {
      const key = normalizeHeader(name);
      const flowTimeline = Array.isArray(currentFlowMap.timeline) ? currentFlowMap.timeline : [];
      const direct = currentFlowMap.byName.get(key);
      if (direct && direct.length) {
        if (flowTimeline.length) return alignSeriesByTimeline(flowTimeline, currentFlowMap.timeline, direct);
        return direct;
      }

      const flowCanon = currentFlowCanonical.get(canonicalName(key));
      if (flowCanon && flowCanon.length) {
        if (flowTimeline.length) return alignSeriesByTimeline(flowTimeline, currentFlowMap.timeline, flowCanon);
        return flowCanon;
      }

      const internalDirect = currentInternalFlowMap.byName.get(key);
      if (internalDirect && internalDirect.length) {
        if (flowTimeline.length) {
          return alignSeriesByTimeline(flowTimeline, currentInternalFlowMap.timeline, internalDirect);
        }
        return internalDirect;
      }

      const internalCanon = currentInternalFlowCanonical.get(canonicalName(key));
      if (internalCanon && internalCanon.length) {
        if (flowTimeline.length) {
          return alignSeriesByTimeline(flowTimeline, currentInternalFlowMap.timeline, internalCanon);
        }
        return internalCanon;
      }

      return [];
    }

    function getSimFlowSeriesForName(name) {
      const key = normalizeHeader(name);
      const flowTimeline = Array.isArray(currentFlowMap.timeline) ? currentFlowMap.timeline : [];
      const direct = currentFlowMap.byName.get(key);
      if (direct && direct.length) {
        if (flowTimeline.length) return alignSeriesByTimeline(flowTimeline, currentFlowMap.timeline, direct);
        return direct;
      }
      const canon = currentFlowCanonical.get(canonicalName(key));
      if (canon && canon.length) {
        if (flowTimeline.length) return alignSeriesByTimeline(flowTimeline, currentFlowMap.timeline, canon);
        return canon;
      }
      return [];
    }

    function hasAnyFlowSeries(name) {
      const values = getFlowSeriesForName(name);
      if (Array.isArray(values) && values.length) {
        for (let i = 0; i < values.length; i += 1) {
          if (Number.isFinite(values[i])) return true;
        }
      }
      return false;
    }

    function getStageObsSeriesForName(name) {
      const key = normalizeHeader(name);
      const aligned = currentStageObsAlignedByStage.get(key);
      if (aligned && aligned.length) return aligned;
      const direct = currentStageObsMap.byName.get(key);
      if (direct && direct.length) return direct;
      const canon = currentStageObsCanonical.get(canonicalName(key));
      if (canon && canon.length) return canon;
      return [];
    }

    function loadGateRows(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length < 2) return [];
      const headers = rows[0].map(normalizeHeader);
      const idIndex = headers.indexOf('id');
      const xIndex = headers.indexOf('x');
      const yIndex = headers.indexOf('y');
      const zIndex = headers.indexOf('z');
      const typeIndex = headers.indexOf('type');
      const nameIndex = headers.indexOf('gate_name');
      return rows.slice(1).map((cells) => {
        const x = Number(cells[xIndex]);
        const y = Number(cells[yIndex]);
        const z = Number(cells[zIndex]);
        return {
          id: String(cells[idIndex] || '').trim(),
          name: String(cells[nameIndex] || '').trim(),
          x,
          y,
          z,
          type: String(cells[typeIndex] || '').trim()
        };
      }).filter((item) => item.name && Number.isFinite(item.x) && Number.isFinite(item.y));
    }

    function loadSeriesMap(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length < 2) return { timeline: [], byName: new Map(), seriesHeaders: [] };
      const headers = rows[0].map(normalizeHeader).filter((_, index) => index < rows[0].length - 1 || normalizeHeader(rows[0][index]));
      let timeIndex = headers.findIndex((value) => value === 'point/time' || value === 'tm' || value === 'time');
      if (timeIndex < 0) timeIndex = 0;
      const timeline = [];
      const byName = new Map();
      const seriesHeaders = [];
      headers.forEach((header, index) => {
        if (!header || index === timeIndex) return;
        byName.set(header, []);
        seriesHeaders.push(header);
      });
      rows.slice(1).forEach((cells) => {
        const timeValue = normalizeTimeKey(cells[timeIndex]);
        if (!timeValue) return;
        timeline.push(timeValue);
        headers.forEach((header, index) => {
          if (!header || index === timeIndex) return;
          const series = byName.get(header);
          const value = Number(cells[index]);
          if (series) series.push(Number.isFinite(value) ? value : NaN);
        });
      });
      return { timeline, byName, seriesHeaders };
    }

    function alignSeriesByTimeline(baseTimeline, sourceTimeline, sourceValues) {
      const base = Array.isArray(baseTimeline) ? baseTimeline : [];
      const srcTimeline = Array.isArray(sourceTimeline) ? sourceTimeline : [];
      const srcValues = Array.isArray(sourceValues) ? sourceValues : [];
      if (!base.length) return [];
      const timeToValue = new Map();
      const n = Math.min(srcTimeline.length, srcValues.length);
      for (let i = 0; i < n; i += 1) {
        const tm = normalizeTimeKey(srcTimeline[i]);
        if (!tm) continue;
        const v = srcValues[i];
        if (!Number.isFinite(v)) continue;
        if (!timeToValue.has(tm)) timeToValue.set(tm, v);
      }
      return base.map((tm) => {
        const key = normalizeTimeKey(tm);
        return timeToValue.has(key) ? timeToValue.get(key) : NaN;
      });
    }

    function loadTdSeriesMap(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length < 2) return { timeline: [], byName: new Map(), seriesHeaders: [] };
      const headers = rows[0].map(normalizeHeader);
      const timeIndex = headers.findIndex((value) => value === 'tm' || value === 'time' || value === 'point/time');
      const objIndex = headers.findIndex((value) => value === 'obj' || value === 'name');
      const valueIndex = headers.findIndex((value) => value === 'value');
      if (timeIndex < 0 || objIndex < 0 || valueIndex < 0) {
        return loadSeriesMap(csvText);
      }

      const timeline = [];
      const timeToIndex = new Map();
      const byName = new Map();
      const seriesHeaders = [];

      rows.slice(1).forEach((cells) => {
        const t = normalizeTimeKey(cells[timeIndex]);
        const obj = normalizeHeader(cells[objIndex]);
        const value = Number(cells[valueIndex]);
        if (!t || !obj || !Number.isFinite(value)) return;

        if (!timeToIndex.has(t)) {
          timeToIndex.set(t, timeline.length);
          timeline.push(t);
          byName.forEach((arr) => arr.push(NaN));
        }
        if (!byName.has(obj)) {
          byName.set(obj, new Array(timeline.length).fill(NaN));
          seriesHeaders.push(obj);
        }
        const idx = timeToIndex.get(t);
        byName.get(obj)[idx] = value;
      });

      return { timeline, byName, seriesHeaders };
    }

    function loadSeriesByResolvedPath(resolved) {
      const sourcePath = resolved && resolved.path ? String(resolved.path) : '';
      const csvText = resolved && typeof resolved.text === 'string' ? resolved.text : '';
      const parsed = isTdFormatPath(sourcePath) ? loadTdSeriesMap(csvText) : loadSeriesMap(csvText);
      parsed.format = isTdFormatPath(sourcePath) ? 'td' : 'pivot';
      parsed.sourcePath = sourcePath;
      return parsed;
    }

    function buildObsAlignedMap(obsMap, flowMap) {
      const aligned = new Map();
      const obsHeaders = Array.isArray(obsMap.seriesHeaders) ? obsMap.seriesHeaders : [];
      const flowHeaders = Array.isArray(flowMap.seriesHeaders) ? flowMap.seriesHeaders : [];
      const baseTimeline = Array.isArray(flowMap.timeline) ? flowMap.timeline : [];
      const obsByCanon = new Map();
      const disallowSyntheticObsPrefixes = ['inflow', 'leakage', 'd'];
      obsHeaders.forEach((name) => {
        const canon = canonicalName(name);
        if (canon && !obsByCanon.has(canon)) obsByCanon.set(canon, name);
      });
      flowHeaders.forEach((flowName, idx) => {
        if (!flowName) return;
        const flowCanon = canonicalName(flowName);
        if (disallowSyntheticObsPrefixes.some((prefix) => flowCanon.indexOf(prefix) === 0)) return;
        const byName = obsMap.byName.get(flowName);
        let obsName = byName ? flowName : '';
        if (!obsName) {
          if (flowCanon && obsByCanon.has(flowCanon)) obsName = obsByCanon.get(flowCanon);
        }
        if (!obsName) return;
        const values = obsMap.byName.get(obsName);
        if (!values || !values.length) return;
        const alignedValues = alignSeriesByTimeline(baseTimeline, obsMap.timeline, values);
        aligned.set(flowName, alignedValues);
      });
      return aligned;
    }

    function buildGateTypeMapFromEdges(edges) {
      const gateTypeMap = new Map();
      const edgeList = Array.isArray(edges) ? edges : [];
      edgeList.forEach((edge) => {
        if (!edge) return;
        const rawType = edge.edgeType;
        const edgeType = Number(rawType);
        if (!Number.isFinite(edgeType)) return;
        const names = [edge.source, edge.target, edge.end]
          .map((value) => String(value || '').trim())
          .filter((name) => isValidNodeName(name));
        names.forEach((name) => {
          if (!gateTypeMap.has(name)) {
            gateTypeMap.set(name, edgeType);
          }
        });
      });
      return gateTypeMap;
    }

    function findFirstGateByType(gates, typeValue) {
      const gateList = Array.isArray(gates) ? gates : [];
      const expect = Number(typeValue);
      if (!Number.isFinite(expect)) return '';
      for (let i = 0; i < gateList.length; i += 1) {
        const gateName = String(gateList[i] && gateList[i].name || '').trim();
        if (!gateName) continue;
        const gateType = Number(currentGateTypeByName.get(gateName));
        if (Number.isFinite(gateType) && gateType === expect) return gateName;
      }
      return '';
    }

    function loadEdges(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length < 2) return [];
      const headers = rows[0].map(normalizeHeader);
      const sourceIndex = headers.indexOf('source');
      const targetIndex = headers.indexOf('target');
      const endIndex = headers.indexOf('end');
      const typeIndex = headers.indexOf('ConnectionType');
      const edgeTypeIndex = headers.indexOf('type');
      const canalIndex = headers.indexOf('canal');
      const idIndex = headers.indexOf('id');
      const gateBottomIndex = headers.indexOf('gate_bottom_elevation');
      return rows.slice(1).map((cells) => {
        const source = String(cells[sourceIndex] || '').trim();
        const target = String(cells[targetIndex] || '').trim();
        const end = String(cells[endIndex] || '').trim();
        const connectionType = String(cells[typeIndex] || '').trim();
        const canal = String(cells[canalIndex] || '').trim();
        const id = String(cells[idIndex] || '').trim();
        const edgeType = Number(cells[edgeTypeIndex]);
        const gateBottomElevation = Number(cells[gateBottomIndex]);
        return { source, target, end, connectionType, canal, id, edgeType, gateBottomElevation };
      }).filter((row) => row.source || row.target || row.end);
    }

    function isValidNodeName(name) {
      return !!name && name !== '-1';
    }

    function addSeries(sumArr, values) {
      if (!sumArr || !values || !values.length) return;
      const len = Math.min(sumArr.length, values.length);
      for (let i = 0; i < len; i += 1) {
        sumArr[i] += Number.isFinite(values[i]) ? values[i] : 0;
      }
    }

    function renderSelectionCharts(gateName) {
      selectedGateName = gateName;
      gateLayer.changed();
      resetPendingPlotlyCharts();
      setChannelPaneMeta(currentStageMap.timeline);
      setGatePaneMeta(currentFlowMap.timeline);
      const relatedEdges = currentEdges.filter((edge) =>
        edge.source === gateName || edge.target === gateName || edge.end === gateName
      );

      const targetSet = new Set();
      relatedEdges.forEach((edge) => {
        if (isValidNodeName(edge.target)) targetSet.add(edge.target);
      });

      const inflowNodes = new Set();
      const outflowNodes = new Set();
      const segmentInfo = getCurrentChannelSegmentInfo();
      const segmentMode = !!(segmentInfo && canonicalName(segmentInfo.source) === canonicalName(gateName));

      if (segmentMode) {
        // 娓犳妯″紡涓ユ牸鍙ｅ緞锛?
        // 鍏ユ祦 = 涓婃父鑺傚埗闂?+ direct(type=1/5)
        // 鍑烘祦 = 涓嬫父鑺傚埗闂?+ direct(type=2/6)
        if (isValidNodeName(segmentInfo.target)) outflowNodes.add(segmentInfo.target);
        (Array.isArray(segmentInfo.directRows) ? segmentInfo.directRows : []).forEach((edge) => {
          const targetName = isValidNodeName(edge.target) ? edge.target : '';
          if (!targetName) return;
          const edgeType = Number(edge.edgeType);
          if (edgeType === 1 || edgeType === 5) {
            inflowNodes.add(targetName);
          } else if (edgeType === 2 || edgeType === 6) {
            outflowNodes.add(targetName);
          }
        });
      } else {
        // 闈炴笭娈垫ā寮忔部鐢ㄦ棦鏈夊垎绫昏鍒欍€?
        relatedEdges.forEach((edge) => {
          if (edge.target === gateName) {
            if (isValidNodeName(edge.source)) inflowNodes.add(edge.source);
          }
          if (edge.source === gateName) {
            const targetName = isValidNodeName(edge.target) ? edge.target : '';
            const endName = isValidNodeName(edge.end) ? edge.end : '';
            const isDirect = String(edge.connectionType || '').trim() === 'direct';
            const edgeType = Number(edge.edgeType);

            if (targetName) {
              if (isDirect) {
                if (edgeType === 1 || edgeType === 5) {
                  inflowNodes.add(targetName);
                } else if (edgeType === 2 || edgeType === 6) {
                  outflowNodes.add(targetName);
                } else {
                  outflowNodes.add(targetName);
                }
              } else {
                outflowNodes.add(targetName);
              }
            }

            if (endName) {
              outflowNodes.add(endName);
            }
          }
        });
      }

      const relatedFlowNodes = new Set([gateName]);
      inflowNodes.forEach((name) => relatedFlowNodes.add(name));
      outflowNodes.forEach((name) => relatedFlowNodes.add(name));

      gateChartListEl.innerHTML = '';
      channelChartListEl.innerHTML = '';

      const channelCards = [];
      if (segmentMode) {
        // 娓犳妯″紡锛氫弗鏍兼寜涓昏竟 source/target 灞曠ず銆?
        const segmentSource = String(segmentInfo.source || '').trim();
        const segmentTarget = String(segmentInfo.target || '').trim();

        // source 闂镐笅姘翠綅锛氫紭鍏?H2锛岀己澶辨椂鍥為€€ H1銆?
        let sourceDownValues = getStageSeriesByName(currentStageH2Map, segmentSource);
        let sourceDownTimeline = currentStageH2Map.timeline;
        let sourceDownLabel = 'source 闸下水位(H2)';
        if (!sourceDownValues.length) {
          sourceDownValues = getStageSeriesByName(currentStageMap, segmentSource);
          sourceDownTimeline = currentStageMap.timeline;
          sourceDownLabel = 'source 闸下水位(回退H1)';
        }
        if (sourceDownValues.length) {
          const sourceObsValues = getStageObsSeriesForName(segmentSource);
          const sourceLastValue = getLastFiniteValue(sourceDownValues);
          const sourceObsLastValue = getLastFiniteValue(sourceObsValues);
          const sourceMeta = '末值=' + (sourceLastValue == null ? '-' : sourceLastValue.toFixed(3)) + ' m' +
            (sourceObsValues.length ? (' | 实测末值=' + (sourceObsLastValue == null ? '-' : sourceObsLastValue.toFixed(3)) + ' m') : '');
          channelCards.push(buildChartCardHtml(segmentSource, sourceDownValues, sourceDownLabel, {
            timeline: sourceDownTimeline,
            yUnit: 'm',
            obsValues: sourceObsValues,
            showTimelineInfo: false,
            headerMeta: sourceMeta
          }));
        }

        // target 闂镐笂姘翠綅锛氫娇鐢?H1(stage) 鏄惧紡灞曠ず銆?
        const targetUpValues = getStageSeriesByName(currentStageMap, segmentTarget);
        if (targetUpValues.length) {
          const targetObsValues = getStageObsSeriesForName(segmentTarget);
          const targetLastValue = getLastFiniteValue(targetUpValues);
          const targetObsLastValue = getLastFiniteValue(targetObsValues);
          const targetMeta = '末值=' + (targetLastValue == null ? '-' : targetLastValue.toFixed(3)) + ' m' +
            (targetObsValues.length ? (' | 实测末值=' + (targetObsLastValue == null ? '-' : targetObsLastValue.toFixed(3)) + ' m') : '');
          channelCards.push(buildChartCardHtml(segmentTarget, targetUpValues, 'target 闸上水位(H1)', {
            timeline: currentStageMap.timeline,
            yUnit: 'm',
            obsValues: targetObsValues,
            showTimelineInfo: false,
            headerMeta: targetMeta
          }));
        }
      } else {
        const targetNames = Array.from(targetSet);
        const sourceStageValues = currentStageMap.byName.get(gateName) || [];
        if (sourceStageValues.length) {
          const sourceStageObsValues = getStageObsSeriesForName(gateName);
          const sourceLastValue = getLastFiniteValue(sourceStageValues);
          const sourceObsLastValue = getLastFiniteValue(sourceStageObsValues);
          const sourceMeta = '末值=' + (sourceLastValue == null ? '-' : sourceLastValue.toFixed(3)) + ' m' +
            (sourceStageObsValues.length ? (' | 实测末值=' + (sourceObsLastValue == null ? '-' : sourceObsLastValue.toFixed(3)) + ' m') : '');
          channelCards.push(buildChartCardHtml(gateName, sourceStageValues, 'source 闸前水位', {
            timeline: currentStageMap.timeline,
            yUnit: 'm',
            obsValues: sourceStageObsValues,
            showTimelineInfo: false,
            headerMeta: sourceMeta
          }));
        }
        for (let i = 0; i < targetNames.length; i += 1) {
          const targetName = targetNames[i];
          const stageValues = currentStageMap.byName.get(targetName) || [];
          if (!stageValues.length) continue;
          const stageObsValues = getStageObsSeriesForName(targetName);
          const lastValue = getLastFiniteValue(stageValues);
          const obsLastValue = getLastFiniteValue(stageObsValues);
          const headerMeta = '末值=' + (lastValue == null ? '-' : lastValue.toFixed(3)) + ' m' +
            (stageObsValues.length ? (' | 实测末值=' + (obsLastValue == null ? '-' : obsLastValue.toFixed(3)) + ' m') : '');
          channelCards.push(buildChartCardHtml(targetName, stageValues, 'target 闸前水位', {
            timeline: currentStageMap.timeline,
            yUnit: 'm',
            obsValues: stageObsValues,
            showTimelineInfo: false,
            headerMeta: headerMeta
          }));
        }
      }
      if (!channelCards.length) {
        channelChartListEl.innerHTML = '<div class="chart-empty">未找到当前渠段的 source 闸下水位 / target 闸上水位数据。</div>';
        applyChartListFillMode(channelChartListEl, 0);
      } else {
        channelChartListEl.innerHTML = channelCards.join('');
        applyChartListFillMode(channelChartListEl, channelCards.length);
      }

      const flowTimelineLen = currentFlowMap.timeline.length;
      const inflowSum = new Array(flowTimelineLen).fill(0);
      const outflowSum = new Array(flowTimelineLen).fill(0);
      const inflowItems = [];
      const outflowItems = [];
      const flowCards = [];
      const relatedFlowCards = [];
      const relatedFlowNameSet = new Set(Array.from(relatedFlowNodes).filter((name) => name !== gateName));
      // dN 杈圭晫鍒楅€氬父涓嶅湪 edges 鑺傜偣鍚嶄腑锛涜嫢瀛樺湪 inflowN/leakageN锛屽垯琛ュ厖灞曠ず瀵瑰簲 dN銆?
      Array.from(relatedFlowNameSet).forEach((name) => {
        const m = String(name || '').trim().match(/^(?:inflow|leakage)(\d+)$/i);
        if (!m) return;
        const boundaryName = 'd' + m[1];
        if (hasAnyFlowSeries(boundaryName)) relatedFlowNameSet.add(boundaryName);
      });
      const relatedFlowNames = Array.from(relatedFlowNameSet);
      relatedFlowNames.sort((a, b) => {
        const inA = currentGatesIniNameSet.has(canonicalName(a)) ? 1 : 0;
        const inB = currentGatesIniNameSet.has(canonicalName(b)) ? 1 : 0;
        if (inA !== inB) return inB - inA;
        return String(a || '').localeCompare(String(b || ''), 'zh-CN');
      });

      relatedFlowNames.forEach((name) => {
        if (name === gateName) return;
        const values = getFlowSeriesForName(name);
        const isInGatesIni = currentGatesIniNameSet.has(canonicalName(name));
        if (!values.length && !isInGatesIni) return;

        const obsValues = getObsSeriesForName(name);
        const lastValue = getLastFiniteValue(values);
        const obsLastValue = getLastFiniteValue(obsValues);
        const role = inflowNodes.has(name)
          ? '入流关联闸门'
          : (outflowNodes.has(name) ? '出流关联闸门' : '关联闸门');
        const tag = isInGatesIni ? '' : ' [非Gates.ini]';
        const headerMeta = role + ' | 末值=' + (lastValue == null ? '-' : lastValue.toFixed(3)) + ' m^3/s' +
          (obsValues.length ? (' | 实测末值=' + (obsLastValue == null ? '-' : obsLastValue.toFixed(3)) + ' m^3/s') : '');
        relatedFlowCards.push(buildChartCardHtml('关联闸门流量', values, name + tag, {
          timeline: currentFlowMap.timeline,
          yUnit: 'm^3/s',
          obsValues: obsValues,
          showTimelineInfo: false,
          headerMeta: headerMeta
        }));

        const simValues = getSimFlowSeriesForName(name);
        if (inflowNodes.has(name)) {
          if (simValues.length) {
            addSeries(inflowSum, simValues);
            inflowItems.push({ name: name, values: simValues });
          }
        } else if (outflowNodes.has(name)) {
          if (simValues.length) {
            addSeries(outflowSum, simValues);
            outflowItems.push({ name: name, values: simValues });
          }
        }
      });

      const currentGateValues = getFlowSeriesForName(gateName);
      const currentGateSimValues = getSimFlowSeriesForName(gateName);
      if (currentGateValues.length) {
        const currentObsValues = getObsSeriesForName(gateName);
        const lastValue = getLastFiniteValue(currentGateValues);
        const obsLastValue = getLastFiniteValue(currentObsValues);
        const headerMeta = '末值=' + (lastValue == null ? '-' : lastValue.toFixed(3)) + ' m^3/s' +
          (currentObsValues.length ? (' | 实测末值=' + (obsLastValue == null ? '-' : obsLastValue.toFixed(3)) + ' m^3/s') : '');
        flowCards.push(buildChartCardHtml('当前闸门流量', currentGateValues, gateName, {
          timeline: currentFlowMap.timeline,
          yUnit: 'm^3/s',
          obsValues: currentObsValues,
          showTimelineInfo: false,
          headerMeta: headerMeta,
          cardKey: gateName
        }));

        // 鍚堣鏇茬嚎涓ユ牸浣跨敤妯℃嫙缁撴灉锛氬綋鍓嶉椄闂ㄤ富鍏ユ祦 + 鍏朵粬妯℃嫙鍏?鍑烘祦銆?
        if (currentGateSimValues.length) {
          addSeries(inflowSum, currentGateSimValues);
          inflowItems.unshift({ name: gateName + '(当前闸门,模拟)', values: currentGateSimValues });
        }
      }

      const hasInflow = inflowSum.some((value) => Math.abs(value) > 1e-12);
      const hasOutflow = outflowSum.some((value) => Math.abs(value) > 1e-12);
      if (hasInflow || hasOutflow) {
        const totalSum = inflowSum.map((value, index) => (value || 0) - (outflowSum[index] || 0));
        flowCards.push(buildCombinedFlowSummaryCard(gateName, inflowSum, outflowSum, totalSum, currentFlowMap.timeline, inflowItems, outflowItems));
      }

      // 淇濇寔褰撳墠宸叉湁鍥惧湪鏈€涓婁晶锛屽啀杩藉姞鍚勫叧鑱旈椄闂ㄨ繃绋嬬嚎銆?
      if (relatedFlowCards.length) {
        flowCards.push.apply(flowCards, relatedFlowCards);
      }

      if (!flowCards.length) {
        gateChartListEl.innerHTML = '<div class="chart-empty">未找到当前闸门流量数据。</div>';
        applyChartListFillMode(gateChartListEl, 0);
      } else {
        gateChartListEl.innerHTML = flowCards.join('');
        applyChartListFillMode(gateChartListEl, flowCards.length);
      }

      renderPendingPlotlyCharts();
      setActiveGateFlowCard(gateName);

      gateChartListEl.parentElement.scrollTop = 0;
      channelChartListEl.parentElement.scrollTop = 0;
    }

    function renderGates(gates, stageMap, iniMissingEdgeNameSet) {
      gateSource.clear();
      const extent = ol.extent.createEmpty();
      let matched = 0;
      gateByName = new Map();
      gates.forEach((gate) => {
        const gateName = String(gate && gate.name || '').trim();
        const isEdgeMissing = !!(iniMissingEdgeNameSet && iniMissingEdgeNameSet.has(canonicalName(gateName)));
        const feature = new ol.Feature({
          geometry: new ol.geom.Point([gate.x, gate.y]),
          name: gateName,
          gateId: gate.id,
          edgeMissing: isEdgeMissing
        });
        gateSource.addFeature(feature);
        ol.extent.extend(extent, feature.getGeometry().getExtent());
        gateByName.set(gateName, gate);

        const seriesValues = stageMap.byName.get(gateName);
        if (!seriesValues || !seriesValues.length) return;
        matched += 1;
      });
      if (!ol.extent.isEmpty(extent)) {
        map.getView().fit(extent, { padding: [40, 210, 40, 40], duration: 0, maxZoom: 12 });
      }

      return matched;
    }

    async function reload() {
      statsEl.textContent = '正在加载渠道与曲线数据...';
      const edgeCandidates = buildPathCandidates(edgesPathEl.value.trim(), [
        'mesh/edges.csv',
        'mesh/edges_new.csv',
        'mesh/edges_utf8.csv'
      ]);
      const stageCandidates = buildPathCandidates(seriesPathEl.value.trim(), [
        'output/channel_Gates_Stastic_h1.csv',
        'input/channel_Gates_Stastic_h1.csv',
        'output/stage.csv',
        'output/stage/stage.csv',
        'input/stage.csv'
      ]);
      const stageH2Candidates = buildPathCandidates('output/channel_Gates_Stastic_h2.csv', [
        'output/stage_encode.csv',
        'output/stage/stage_encode.csv'
      ]);
      const stageObsCandidates = buildPathCandidates(stageObsPathEl.value.trim(), [
        'input/stage_obs_24_td.csv',
        'input/stage_td.csv',
        'output/stage_td.csv',
        'output/stage/stage_td.csv'
      ]);
      const flowCandidates = buildPathCandidates(flowPathEl.value.trim(), [
        'output/channel_Gates_Stastic.csv',
        'output/Q.csv',
        'output/channel_Gates_Stastic_Q_action.csv',
        'output/action.csv'
      ]);
      const obsCandidates = buildPathCandidates(obsPathEl.value.trim(), [
        'input/action_obs.csv',
        'input/action_td.csv',
        'output/action/action_td.csv',
        'output/action_td_.csv'
      ]);
      const [inputTxt, neighborTxt, gateCsv, gatesIniTxt, stageResolved, stageH2Resolved, stageObsResolved, flowResolved, obsResolved, edgesCsv, stakeJson] = await Promise.all([
        fetchText(resolveDataPath(inputPathEl.value.trim())),
        fetchText(resolveDataPath(neighborPathEl.value.trim())),
        fetchText(resolveDataPath(gatesPathEl.value.trim())),
        fetchText(resolveDataPath('mesh/Gates.ini')).catch(() => ''),
        fetchTextFirstResolved(stageCandidates),
        fetchTextFirstResolved(stageH2Candidates).catch(() => ({ path: '', text: '' })),
        fetchTextFirstResolved(stageObsCandidates).catch(() => ({ path: '', text: '' })),
        fetchTextFirstResolved(flowCandidates),
        fetchTextFirstResolved(obsCandidates).catch(() => ({ path: '', text: '' })),
        fetchTextFirst(edgeCandidates),
        fetchText(resolveDataPath('mesh/stake.json')).catch(() => '{}')
      ]);
      const gatesFromCsv = loadGateRows(gateCsv);
      const gatesFromIni = buildGatesFromIniAndInput(gatesIniTxt, inputTxt);
      const gatesIniItems = parseGatesIni(gatesIniTxt);
      currentGatesIniNameSet = new Set(
        gatesIniItems
          .map((item) => canonicalName(item && item.name))
          .filter(Boolean)
      );
      const gateMeshMatched = isGateMeshOneToOne(gatesFromCsv, gatesFromIni);
      const displayGateInfo = buildDisplayGatesFromIni(gatesFromIni, gatesFromCsv, gatesIniItems);
      const gates = displayGateInfo.gates.length ? displayGateInfo.gates : (gatesFromIni.length ? gatesFromIni : gatesFromCsv);
      const missingCoordIniNames = displayGateInfo.missingCoordIniNames;
      const stageMap = loadSeriesByResolvedPath(stageResolved);
      const stageH2Map = stageH2Resolved && stageH2Resolved.text
        ? loadSeriesByResolvedPath(stageH2Resolved)
        : { timeline: [], byName: new Map(), seriesHeaders: [], format: '', sourcePath: '' };
      const stageObsMap = stageObsResolved && stageObsResolved.text
        ? loadSeriesByResolvedPath(stageObsResolved)
        : { timeline: [], byName: new Map(), seriesHeaders: [], format: '', sourcePath: '' };
      const flowMap = loadSeriesByResolvedPath(flowResolved);
      const internalFlowCsv = await fetchText(resolveDataPath('input/action.csv')).catch(() => '');
      const internalFlowMap = internalFlowCsv ? loadSeriesMap(internalFlowCsv) : { timeline: [], byName: new Map(), seriesHeaders: [], format: 'pivot', sourcePath: resolveDataPath('input/action.csv') };
      const obsMap = obsResolved && obsResolved.text
        ? loadSeriesByResolvedPath(obsResolved)
        : { timeline: [], byName: new Map(), seriesHeaders: [], format: '', sourcePath: '' };
      const edges = loadEdges(edgesCsv);
      const edgeNodeCanonicalSet = buildEdgeNodeCanonicalSet(edges);
      const iniMissingEdgeNameSet = buildIniMissingEdgeGateNameSet(gates, currentGatesIniNameSet, edgeNodeCanonicalSet);
      currentIniGatesMissingEdgeSet = iniMissingEdgeNameSet;
      const iniMissingEdgeDisplayNames = gates
        .filter((gate) => iniMissingEdgeNameSet.has(canonicalName(gate && gate.name)))
        .map((gate) => String(gate && gate.name || '').trim())
        .filter(Boolean);
      let stakeMap = {};
      try {
        stakeMap = JSON.parse(String(stakeJson || '{}'));
      } catch (_) {
        stakeMap = {};
      }
      currentStakeMap = stakeMap;
      const channelCount = loadChannels(inputTxt, neighborTxt, gates, edges);
      renderDynamicWaterline(stageMap, edges, gates, flowMap, currentStakeMap);
      currentGateRows = gates;
      currentStageMap = stageMap;
      currentStageH2Map = stageH2Map;
      currentStageObsMap = stageObsMap;
      currentStageObsAlignedByStage = buildObsAlignedMap(stageObsMap, stageMap);
      currentStageObsCanonical = new Map();
      currentStageObsMap.byName.forEach((values, key) => {
        if (!values || !values.length) return;
        currentStageObsCanonical.set(canonicalName(key), values);
      });
      currentFlowMap = flowMap;
      currentInternalFlowMap = internalFlowMap;
      currentFlowCanonical = new Map();
      currentFlowMap.byName.forEach((values, key) => {
        if (!values || !values.length) return;
        currentFlowCanonical.set(canonicalName(key), values);
      });
      currentInternalFlowCanonical = new Map();
      currentInternalFlowMap.byName.forEach((values, key) => {
        if (!values || !values.length) return;
        currentInternalFlowCanonical.set(canonicalName(key), values);
      });
      setChannelPaneMeta(stageMap.timeline);
      setGatePaneMeta(flowMap.timeline);
      currentObsMap = obsMap;
      currentObsAlignedByFlow = buildObsAlignedMap(obsMap, flowMap);
      currentObsCanonical = new Map();
      currentObsMap.byName.forEach((values, key) => {
        if (!values || !values.length) return;
        currentObsCanonical.set(canonicalName(key), values);
      });
      currentEdges = edges;
      currentGateTypeByName = buildGateTypeMapFromEdges(edges);
      const matchedGates = renderGates(gates, stageMap, iniMissingEdgeNameSet);
      selectedGateName = '';
      selectedChannelLabel = '';
      channelLayer.changed();
      gateLayer.changed();
      setGateSegmentInfoButtonState();
      hideCurrentChannelSegmentInfo();
      channelChartListEl.innerHTML = '<div class="chart-empty">点击上方 GIS 图中的闸门点位后，这里会显示对应边 target 的闸前水位图表。</div>';
      gateChartListEl.innerHTML = '<div class="chart-empty">点击上方 GIS 图中的闸门点位后，这里会显示该边相关闸门的流量过程线，以及入流/出流汇总图表。</div>';
      applyChartListFillMode(channelChartListEl, 0);
      applyChartListFillMode(gateChartListEl, 0);

      // 鍒濆鍖栭〉闈㈠悗锛岃嚜鍔ㄩ€変腑 edges.csv 涓?type=0 鐨勯椄闂ㄨ繘琛屽睍绀恒€?
      const firstTypeZeroGate = findFirstGateByType(gates, 0);
      if (firstTypeZeroGate) {
        renderSelectionCharts(firstTypeZeroGate);
      }

      statsEl.textContent = [
        '渠段数量: ' + channelCount,
        '闸门数量: ' + gates.length,
        'Gates.ini 缺少边名映射(按名称): ' + iniMissingEdgeNameSet.size +
          (iniMissingEdgeDisplayNames.length ? (' [' + summarizeNames(iniMissingEdgeDisplayNames, 12) + ']') : ''),
        'Gates.ini 缺少坐标匹配(按名称): ' + missingCoordIniNames.length +
          (missingCoordIniNames.length ? (' [' + summarizeNames(missingCoordIniNames, 12) + ']') : ''),
        '坐标来源: ' + (gateMeshMatched ? 'gates_mesh.csv 与 Gates.ini 已成功匹配' : '坐标回退为 Gates.ini + input.txt 推算(建议补齐)'),
        '已匹配闸门: ' + matchedGates,
        '闸前水位步数: ' + stageMap.timeline.length,
        '实测水位步数: ' + stageObsMap.timeline.length,
        '闸门流量步数: ' + flowMap.timeline.length,
        '实测流量步数: ' + obsMap.timeline.length,
        '边数量: ' + edges.length,
        '高程字段: gates_mesh.csv.z',
        '当前根目录: ' + String(rootPathEl.value || '').trim(),
        '说明: 若图表为空，请先检查 target 目录下的数据文件是否齐全，以及闸门/渠段名称是否一致'
      ].join('\n');
    }

    map.on('singleclick', function(evt) {
      const gateHit = map.forEachFeatureAtPixel(evt.pixel, function(feature, layer) {
        if (layer === gateLayer) return feature;
        return null;
      }, { hitTolerance: 8 });
      if (gateHit) {
        const gateName = String(gateHit.get('name') || '').trim();
        if (!gateName) return;
        selectedGateName = gateName;
        gateLayer.changed();
        // 鐐瑰嚮闂搁棬浠呴珮浜搴旀洸绾垮崱鐗囷紝涓嶆敼鍙樺綋鍓嶆笭娈?闂搁棬鍥捐〃缁撴灉銆?
        setActiveGateFlowCard(gateName);
        return;
      }

      const channelHit = map.forEachFeatureAtPixel(evt.pixel, function(feature, layer) {
        if (layer === channelLayer) return feature;
        return null;
      }, { hitTolerance: 10 });
      if (!channelHit) return;

      const segmentLabel = String(channelHit.get('segmentLabel') || '').trim();
      selectedChannelLabel = segmentLabel;
      channelLayer.changed();
      setGateSegmentInfoButtonState();

      const sourceGate = String(channelHit.get('source') || '').trim();
      if (!sourceGate) return;
      // 鐐瑰嚮娓犳鎸夆€滄笭娈典负鍗曚綅鈥濆垏鎹㈠睍绀虹粨鏋溿€?
      renderSelectionCharts(sourceGate);
    });

    document.getElementById('reloadBtn').addEventListener('click', () => {
      reload().catch((error) => {
        console.error(error);
        statsEl.textContent = String(error && error.message ? error.message : error);
      });
    });

    document.getElementById('fitBtn').addEventListener('click', () => {
      const extG = gateSource.getExtent();
      const extC = channelSource.getExtent();
      let extent = ol.extent.createEmpty();
      if (!ol.extent.isEmpty(extC)) ol.extent.extend(extent, extC);
      if (!ol.extent.isEmpty(extG)) ol.extent.extend(extent, extG);
      if (!ol.extent.isEmpty(extent)) {
        map.getView().fit(extent, { padding: [40, 210, 40, 40], duration: 300, maxZoom: 12 });
      }
    });

    if (waterlineToggleBtnEl) {
      waterlineToggleBtnEl.addEventListener('click', () => {
        setWaterlineCollapsed(!waterlineCollapsed);
      });
    }
    if (waterlinePlayBtnEl) {
      waterlinePlayBtnEl.addEventListener('click', () => {
        playWaterline();
      });
    }
    if (waterlineModeBtnEl) {
      waterlineModeBtnEl.addEventListener('click', () => {
        setWaterlineMode(waterlineMode === 'stake' ? 'gate' : 'stake');
      });
    }
    if (waterlinePauseBtnEl) {
      waterlinePauseBtnEl.addEventListener('click', () => {
        pauseWaterline();
      });
    }
    if (waterlineResetBtnEl) {
      waterlineResetBtnEl.addEventListener('click', () => {
        resetWaterlineView();
      });
    }
    if (gateSegmentInfoBtnEl) {
      gateSegmentInfoBtnEl.addEventListener('click', () => {
        renderCurrentChannelSegmentInfo();
      });
    }
    if (channelAllChartsBtnEl) {
      channelAllChartsBtnEl.addEventListener('click', () => {
        openStandaloneChartsBySpecs('渠段图表（全案例水位）', channelPaneMetaEl, buildAllChannelChartSpecs());
      });
    }
    if (gateAllChartsBtnEl) {
      gateAllChartsBtnEl.addEventListener('click', () => {
        openStandaloneChartsBySpecs('闸门图表（全案例流量）', gatePaneMetaEl, buildAllGateFlowChartSpecs());
      });
    }
    if (segmentInfoCloseBtnEl) {
      segmentInfoCloseBtnEl.addEventListener('click', () => {
        hideCurrentChannelSegmentInfo();
      });
    }
    if (segmentInfoModalEl) {
      segmentInfoModalEl.addEventListener('click', (evt) => {
        if (evt.target === segmentInfoModalEl) hideCurrentChannelSegmentInfo();
      });
    }
    window.addEventListener('keydown', (evt) => {
      if (evt.key === 'Escape') hideCurrentChannelSegmentInfo();
    });
    initLayoutSplitter();
    setWaterlineCollapsed(false);
    setGateSegmentInfoButtonState();

    reload().catch((error) => {
      console.error(error);
      statsEl.textContent = String(error && error.message ? error.message : error);
    });
  </script>
</body>
</html>
